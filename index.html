<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>wenletsgo｜選物清單</title>
<style>
  :root {
    --bg: #faf8f5; --card: #ffffff; --text: #1c1917; --muted: #78716c;
    --accent: #ea580c; --accent-text: #ffffff; --border: #e7e5e4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171412; --card: #221e1b; --text: #f5f0eb; --muted: #a8a29e;
      --accent: #f97316; --accent-text: #1c1005; --border: #383430;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 480px; margin: 0 auto; padding: 28px 16px 40px;
    line-height: 1.6;
  }
  header { text-align: center; margin-bottom: 18px; }
  header h1 { font-size: 1.35rem; letter-spacing: .02em; }
  header p { color: var(--muted); font-size: .9rem; margin-top: 4px; }
  .section { margin: 22px 0 10px; }
  .section h3 {
    font-size: .95rem; color: var(--text); letter-spacing: .03em;
    padding-bottom: 6px; border-bottom: 2px solid var(--accent);
    display: inline-block; margin-bottom: 10px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 16px; margin-bottom: 14px;
  }
  .card h2 { font-size: 1.1rem; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card h2 .tag {
    font-size: .7rem; font-weight: 700; color: var(--accent-text);
    background: var(--accent); border-radius: 6px; padding: 2px 8px; white-space: nowrap;
  }
  .card .hook { font-size: .9rem; color: var(--muted); margin-bottom: 10px; }
  .card .meta { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .card .price { font-size: .9rem; font-weight: 700; }
  .card .sold {
    font-size: .78rem; font-weight: 700; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 999px; padding: 1px 10px;
  }
  .card a.btn {
    display: block; text-align: center; text-decoration: none;
    background: var(--accent); color: var(--accent-text);
    font-weight: 700; font-size: 1rem;
    padding: 13px 0; border-radius: 12px;
  }
  .card a.btn:active { opacity: .85; }
  footer { margin-top: 22px; text-align: center; }
  footer .disclosure { font-size: .78rem; color: var(--muted); }
  footer .updated { font-size: .72rem; color: var(--muted); margin-top: 8px; opacity: .8; }
</style>
</head>
<body>
<header>
  <h1>wenletsgo 選物清單</h1>
  <p>實測比較後整理，每款只講重點。<br>從貼文點進來的，直接找下面那一區 👇</p>
</header>

<main id="cards"></main>

<footer>
  <p class="disclosure">※ 本頁含推廣連結，售價不變，完成購買我會獲得少許回饋，感謝支持。<br>價格與庫存以蝦皮商品頁為準。</p>
  <p class="updated">更新：2026-07-12</p>
</footer>

<!-- 漏斗統計（GoatCounter，免費無 cookie）：Ve 到 goatcounter.com 註冊取得代碼後，
     把下行 YOURCODE 換成帳號代碼、解除註解，重跑 python scripts/build_linkhub.py 並 push 即生效。
<script data-goatcounter="https://YOURCODE.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
-->
<script>
  var DATA = {"campaign": "c0003", "items": [{"name": "日本 eSIM・五分鐘開通", "full_name": "【eSIMGO】日本eSIM 原生網路 24H自動發貨(旅遊網卡)", "hook": "出發前買好掃碼裝上，落地就有網路，不用機場排隊。一張一百四，七十萬人買過。", "price": 140, "sold": "已售 70萬+", "group": "travel", "tag": "暑假出國", "links": {"th": "https://s.shopee.tw/gOQFweSAh"}}]};
  // ?src=ig|th|fb 決定用哪個平台的短連結（sub_id 已烙在短連結裡，供成效歸因）；缺該平台連結時回退 ig。
  var src = new URLSearchParams(location.search).get("src") || "ig";
  var main = document.getElementById("cards");
  // 分區＝讀者的問題語言（從哪類貼文進來就直奔那區），順序固定
  var GROUPS = [
    { id: "travel",  label: "✈️ 出國旅遊" },
    { id: "mite",    label: "🛏 床上除蟎・鼻子過敏" },
    { id: "laundry", label: "🌧 雨天室內晾衣" },
    { id: "clean",   label: "🧹 租屋打掃・除味" },
    { id: "baby",    label: "👶 寶寶日用品" },
    { id: "other",   label: "🔎 其他選物" }
  ];
  function makeCard(it, url) {
    var card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      "<h2><span class='t'></span><span class='tag'></span></h2>" +
      "<p class='hook'></p><div class='meta'><span class='sold'></span><span class='price'></span></div>" +
      "<a class='btn' rel='nofollow sponsored noopener' target='_blank'>到蝦皮看這款 →</a>";
    card.querySelector(".t").textContent = it.name;
    if (it.tag) { card.querySelector(".tag").textContent = it.tag; } else { card.querySelector(".tag").remove(); }
    card.querySelector(".hook").textContent = it.hook;
    if (it.sold) { card.querySelector(".sold").textContent = it.sold; } else { card.querySelector(".sold").remove(); }
    card.querySelector(".price").textContent = "NT$" + it.price.toLocaleString();
    card.querySelector("a").href = url;
    return card;
  }
  GROUPS.forEach(function (g) {
    var inGroup = DATA.items.filter(function (it) {
      return (it.group || "other") === g.id && (it.links[src] || it.links["ig"]);
    });
    if (!inGroup.length) return;
    var sec = document.createElement("div");
    sec.className = "section";
    var h = document.createElement("h3");
    h.textContent = g.label;
    sec.appendChild(h);
    inGroup.forEach(function (it) {
      sec.appendChild(makeCard(it, it.links[src] || it.links["ig"]));
    });
    main.appendChild(sec);
  });
</script>
</body>
</html>
