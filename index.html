<style>
  :root {
    --bg: #faf8f5; --card: #ffffff; --text: #1c1917; --muted: #78716c;
    --accent: #ea580c; --accent-text: #ffffff; --border: #e7e5e4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171412; --card: #221e1b; --text: #f5f0eb; --muted: #a8a29e;
      --accent: #f97316; --accent-text: #1c1005; --border: #383430;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 480px; margin: 0 auto; padding: 28px 16px 40px;
    line-height: 1.6;
  }
  header { text-align: center; margin-bottom: 18px; }
  header h1 { font-size: 1.35rem; letter-spacing: .02em; }
  header p { color: var(--muted); font-size: .9rem; margin-top: 4px; }
  .section { margin: 22px 0 10px; }
  .section h3 {
    font-size: .95rem; color: var(--text); letter-spacing: .03em;
    padding-bottom: 6px; border-bottom: 2px solid var(--accent);
    display: inline-block; margin-bottom: 10px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 16px; margin-bottom: 14px;
  }
  .card h2 { font-size: 1.1rem; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card h2 .tag {
    font-size: .7rem; font-weight: 700; color: var(--accent-text);
    background: var(--accent); border-radius: 6px; padding: 2px 8px; white-space: nowrap;
  }
  .card .hook { font-size: .9rem; color: var(--muted); margin-bottom: 10px; }
  .card .meta { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .card .price { font-size: .9rem; font-weight: 700; }
  .card .sold {
    font-size: .78rem; font-weight: 700; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 999px; padding: 1px 10px;
  }
  .card a.btn {
    display: block; text-align: center; text-decoration: none;
    background: var(--accent); color: var(--accent-text);
    font-weight: 700; font-size: 1rem;
    padding: 13px 0; border-radius: 12px;
  }
  .card a.btn:active { opacity: .85; }
  footer { margin-top: 22px; text-align: center; }
  footer .disclosure { font-size: .78rem; color: var(--muted); }
  footer .updated { font-size: .72rem; color: var(--muted); margin-top: 8px; opacity: .8; }
</style>
</head>
<body>

  // ?src=ig|th|fb 決定用哪個平台的短連結（sub_id 已烙在短連結裡，供成效歸因）；缺該平台連結時依序回退到任一存在的連結，不會整品消失。
  var src = new URLSearchParams(location.search).get("src") || "ig";
  // 免註冊 hit counter（07-18 議會裁決行動#2：profile→hub 漏斗此前完全量不到）。
  // abacus.jasoncameron.dev：no-auth、免金鑰，GET /hit/{ns}/{key} 即計數+1。per ?src 分流，讀取見 /get/{ns}/{key}。
  // key 長度下限 3 碼，src 值（ig/th/fb/ln）只有 2 碼，故加 "src-" 前綴。
  // 失敗（服務掛/被封鎖）靜默吞掉，絕不影響頁面渲染或導流。
  fetch("https://abacus.jasoncameron.dev/hit/wenzuo-linkhub/src-" + encodeURIComponent(src)).catch(function () {});
  var FALLBACK_ORDER = ["ig", "th", "fb", "ln"];
  function pickUrl(it) {
    if (it.links[src]) return it.links[src];
    for (var i = 0; i < FALLBACK_ORDER.length; i++) {
      if (it.links[FALLBACK_ORDER[i]]) return it.links[FALLBACK_ORDER[i]];
    }
    return null;
  }
  var main = document.getElementById("cards");
  // 分區＝讀者的問題語言（從哪類貼文進來就直奔那區），順序固定

  }
  GROUPS.forEach(function (g) {
    var inGroup = DATA.items.filter(function (it) {

  });
